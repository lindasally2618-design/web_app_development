{% extends "base.html" %}
{% block title %}新增交易{% endblock %}
{% block content %}
<div class="container">
  <h2 class="mb-4">新增交易</h2>
  <form method="POST" action="{{ url_for('ledger.add_transaction') }}">
    <div class="mb-3">
      <label class="form-label">日期</label>
      <input type="date" name="date" class="form-control" required value="{{ today }}">
    </div>
    <div class="mb-3">
      <label class="form-label">類型</label>
      <select name="type" class="form-select" required>
        <option value="expense">支出</option>
        <option value="income">收入</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">金額</label>
      <input type="number" step="0.01" name="amount" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">分類</label>
      <select name="category_id" class="form-select" required>
        <option value="1">飲食</option>
        <option value="2">交通</option>
        <option value="3">購物</option>
        <option value="4">薪資</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">備註</label>
      <textarea name="note" class="form-control" rows="3"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">儲存</button>
    <a href="{{ url_for('ledger.list_transactions') }}" class="btn btn-secondary">取消</a>
  </form>
</div>
{% endblock %}
