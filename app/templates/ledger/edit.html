# app/templates/ledger/edit.html
{% extends "base.html" %}
{% block title %}編輯交易 - 個人記賬簿{% endblock %}
{% block content %}
<h2 class="mb-4">編輯交易</h2>
<form method="post" action="{{ url_for('ledger.edit_transaction', id=transaction.id) }}">
  <div class="mb-3">
    <label for="date" class="form-label">日期</label>
    <input type="date" class="form-control" id="date" name="date" value="{{ transaction.date }}" required>
  </div>
  <div class="mb-3">
    <label for="type" class="form-label">類型</label>
    <select class="form-select" id="type" name="type" required>
      <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>收入</option>
      <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>支出</option>
    </select>
  </div>
  <div class="mb-3">
    <label for="amount" class="form-label">金額</label>
    <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ transaction.amount }}" required>
  </div>
  <div class="mb-3">
    <label for="category_id" class="form-label">分類</label>
    <select class="form-select" id="category_id" name="category_id">
      <option value="">未分類</option>
      {% for cat in categories %}
      <option value="{{ cat.id }}" {% if transaction.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label for="note" class="form-label">備註</label>
    <textarea class="form-control" id="note" name="note" rows="3">{{ transaction.note }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">更新</button>
  <a href="{{ url_for('ledger.list_transactions') }}" class="btn btn-secondary ms-2">取消</a>
</form>
{% endblock %}
